<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FISIX | Premium Streetwear</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#070707;

overflow:hidden;

color:white;
}

/* BACKGROUND GLOW */

.bg-glow{

position:absolute;

width:700px;
height:700px;

background:rgba(212,175,55,0.15);

filter:blur(140px);

border-radius:50%;

top:-200px;
right:-150px;

animation:floatGlow 8s ease-in-out infinite;
}

@keyframes floatGlow{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(30px);
}

100%{
transform:translateY(0px);
}

}

/* HERO */

.hero{

position:relative;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;
}

/* FLOATING CARD */

.card{

position:relative;

width:420px;

padding:45px;

border-radius:35px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

box-shadow:
0 25px 60px rgba(0,0,0,0.55),
0 0 40px rgba(212,175,55,0.08);

text-align:center;

transform-style:preserve-3d;

animation:floatCard 5s ease-in-out infinite;
}

@keyframes floatCard{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-18px);
}

100%{
transform:translateY(0px);
}

}

/* LOGO */

.logo{

width:130px;

margin-bottom:25px;

border-radius:16px;

filter:drop-shadow(0 0 15px rgba(212,175,55,0.2));
}

/* BRAND */

.small-text{

letter-spacing:4px;

font-size:0.8rem;

color:#d4af37;

margin-bottom:15px;
}

h1{

font-size:5rem;

font-weight:800;

letter-spacing:10px;

line-height:1;

margin-bottom:20px;
}

.gold{
color:#d4af37;
}

.tagline{

font-size:1rem;

line-height:2;

color:#d0d0d0;

margin-bottom:35px;
}

/* BUTTON */

.btn{

display:inline-block;

padding:16px 34px;

border-radius:50px;

background:#d4af37;

color:#111;

text-decoration:none;

font-weight:600;

transition:0.35s ease;

box-shadow:0 12px 35px rgba(212,175,55,0.22);
}

.btn:hover{

transform:translateY(-5px) scale(1.04);

background:#ebc95b;
}

/* FLOATING CIRCLES */

.circle1,
.circle2{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.04);

backdrop-filter:blur(10px);
}

.circle1{

width:180px;
height:180px;

top:12%;
left:12%;

animation:move1 6s ease-in-out infinite;
}

.circle2{

width:120px;
height:120px;

bottom:15%;
right:15%;

animation:move2 7s ease-in-out infinite;
}

@keyframes move1{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-25px);
}

100%{
transform:translateY(0px);
}

}

@keyframes move2{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(20px);
}

100%{
transform:translateY(0px);
}

}

/* FOOTER */

.footer{

position:absolute;

bottom:20px;

width:100%;

text-align:center;

font-size:0.9rem;

color:#888;
}

.footer a{
color:#d4af37;
text-decoration:none;
}

/* MOBILE */

@media(max-width:768px){

.card{

width:100%;

max-width:340px;

padding:35px 25px;
}

h1{

font-size:3rem;

letter-spacing:5px;
}

.tagline{
font-size:0.92rem;
line-height:1.9;
}

.logo{
width:100px;
}

.circle1{
width:120px;
height:120px;
left:-30px;
}

.circle2{
width:90px;
height:90px;
right:-20px;
}

}

</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="circle1"></div>
<div class="circle2"></div>

<section class="hero">

<div class="card">

<img src="fisix-logo.png" alt="FISIX Logo" class="logo">

<p class="small-text">
PREMIUM STREETWEAR
</p>

<h1>
FI<span class="gold">SIX</span>
</h1>

<p class="tagline">

Minimal aesthetics.
Oversized confidence.
Affordable premium fashion
inspired by modern street culture.

</p>

<a href="https://www.instagram.com/fisix.store/" target="_blank" class="btn">

Explore Collection

</a>

</div>

</section>

<div class="footer">

<p>
📞 Pawan | +91 62398 19213
</p>

<p>
✉️
<a href="mailto:fisixwear@gmail.com">
fisixwear@gmail.com
</a>
</p>

</div>

</body>

</html>
