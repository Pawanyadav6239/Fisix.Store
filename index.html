<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FISIX | Affordable Premium Streetwear</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      color:#d4af37;
      font-family:Arial, sans-serif;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding:20px;
    }

    .container{
      max-width:700px;
    }

    .logo{
      width:140px;
      margin-bottom:30px;
      border-radius:10px;
    }

    h1{
      font-size:3rem;
      margin-bottom:15px;
      letter-spacing:4px;
    }

    .tagline{
      color:#ffffff;
      font-size:1.2rem;
      margin-bottom:15px;
    }

    .desc{
      color:#bbbbbb;
      line-height:1.7;
      margin-bottom:40px;
    }

    .btn{
      display:inline-block;

      background:#d4af37;
      color:#111111;

      padding:14px 28px;

      text-decoration:none;

      border-radius:40px;

      font-weight:bold;

      transition:0.3s ease;
    }

    .btn:hover{
      transform:translateY(-3px);
      background:#ebc95b;
    }

    footer{
      margin-top:50px;
      color:#888888;
      font-size:0.95rem;
      line-height:1.8;
    }

    footer a{
      color:#d4af37;
      text-decoration:none;
    }

    @media(max-width:768px){

      h1{
        font-size:2.2rem;
      }

      .tagline{
        font-size:1rem;
      }

      .desc{
        font-size:0.95rem;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <img src="fisix-logo.png" class="logo" alt="FISIX Logo">

    <h1>FISIX</h1>

    <p class="tagline">
      Engineered for Every Man
    </p>

    <p class="desc">
      Affordable premium streetwear inspired by modern culture,
      clean aesthetics, and confidence.
    </p>

    <a href="https://www.instagram.com/fisix.store/" target="_blank" class="btn">
      Follow on Instagram
    </a>

    <footer>

      <p>
        📞 Pawan | +91 62398 19213
      </p>

      <p>
        ✉️
        <a href="mailto:fisixwear@gmail.com">
          fisixwear@gmail.com
        </a>
      </p>

      <p>
        © 2026 FISIX. All rights reserved.
      </p>

    </footer>

  </div>

</body>

</html>
